services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: autorent-backend:latest
    container_name: autorent_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./var/www/vhosts/automaworks.es/autorent.automaworks.es/data/staticfiles:/app/staticfiles
      - ./var/www/vhosts/automaworks.es/autorent.automaworks.es/data/media:/app/media
    ports:
      - "8072:8072"
    depends_on:
      - redis

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: autorent-api:latest
    container_name: autorent_api
    restart: unless-stopped
    environment:
      API_ROOT_PATH: /gps
    ports:
      - "8073:8073"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: autorent-frontend:latest
    container_name: autorent_frontend
    restart: unless-stopped
    ports:
      - "8074:8074"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: autorent_redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    expose:
      - "6379"

