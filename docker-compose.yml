services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: autorent-backend:latest
    container_name: autorent_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Estas variables las define Plesk en el contenedor.
      # En local se toman del .env (env_file de arriba).
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      # Volúmenes mapeados al VPS para backups (fotos, documentos, estáticos)
      - ./data/media:/app/media
      - ./data/static:/app/staticfiles
    ports:
      - "8072:8072"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: autorent_redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    # No exponemos el puerto al exterior: solo lo usa la red interna
    expose:
      - "6379"

