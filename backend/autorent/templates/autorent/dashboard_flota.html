{% extends "admin/base_site.html" %}
{% load i18n static %}

{% block extrastyle %}
    <meta name="referrer" content="origin">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #map-container {
            position: relative;
            height: calc(100vh - 160px);
            min-height: 480px;
            width: 100%;
            overflow: hidden;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        #map { height: 100%; width: 100%; z-index: 1; }

        /* Paneles flotantes sobre el mapa */
        .map-overlays {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 330px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .map-panel {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.18);
            overflow: hidden;
            pointer-events: auto;
            transition: all 0.3s ease;
        }
        .panel-header {
            padding: 11px 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            user-select: none;
        }
        .panel-body {
            max-height: 0;
            overflow-y: auto;
            transition: max-height 0.35s ease-out;
            opacity: 0;
        }
        .map-panel.is-open .panel-body {
            max-height: 55vh;
            opacity: 1;
            border-top: 1px solid #eee;
        }
        .toggle-icon { transition: transform 0.3s; }
        .map-panel.is-open .toggle-icon { transform: rotate(180deg); }

        #panel-flota .panel-header { background: #fff; color: #333; border-bottom: 1px solid #eee; }
        #panel-detalle .panel-header { background: #0891b2; color: #fff; }
        #panel-detalle.hidden { display: none; }

        .veh-item {
            padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #f0f0f0;
            display: flex; align-items: center; gap: 10px;
        }
        .veh-item:hover { background: #f1f5f9; }
        .veh-item.activo { background: #ecfeff; }
        .veh-dot { font-size: 1.1rem; }
        .veh-nombre { font-weight: 600; font-size: 0.9rem; }
        .veh-meta { font-size: 0.78rem; color: #64748b; }
        .badge-estado { font-size: 0.7rem; padding: 1px 7px; border-radius: 999px; font-weight: 600; }
        .badge-on { background: #dcfce7; color: #166534; }
        .badge-off { background: #fee2e2; color: #991b1b; }

        /* Tabla de detalle */
        .detalle-fila { display: flex; justify-content: space-between; padding: 6px 14px; font-size: 0.84rem; border-bottom: 1px solid #f3f4f6; }
        .detalle-fila .etq { color: #64748b; }
        .detalle-fila .val { font-weight: 600; font-variant-numeric: tabular-nums; }

        .flota-status { padding: 8px; text-align: center; font-size: 0.75rem; color: #64748b; background: #f8f9fa; border-top: 1px solid #eee; }

        #panel-avisos.hidden { display: none; }
        .alert-item {
            padding: 9px 11px; border-bottom: 1px solid #f1f1f1; font-size: 0.82rem;
            border-left: 4px solid #dc3545; margin-bottom: 5px; background: #fff; border-radius: 4px;
        }
        .alert-item.mantenimiento { border-left-color: #f59e0b; }
        .alert-item.velocidad { border-left-color: #dc3545; }
        .alert-item.conduccion { border-left-color: #8b5cf6; }
        .alert-top { display: flex; justify-content: space-between; font-weight: 600; }
        .alert-msg { color: #475569; font-size: 0.78rem; margin-top: 2px; }

        .score-box { padding: 12px 14px; text-align: center; border-bottom: 1px solid #f3f4f6; }
        .score-num { font-size: 2rem; font-weight: 700; line-height: 1; }
        .score-label { font-size: 0.72rem; color: #64748b; text-transform: uppercase; letter-spacing: .04em; }
        .score-buena { color: #16a34a; } .score-media { color: #f59e0b; } .score-mala { color: #dc3545; }

        @media (max-width: 768px) {
            .map-overlays { width: calc(100% - 20px); left: 10px; right: 10px; }
        }
    </style>
{% endblock %}

{% block content %}
<div id="map-container">
    <div class="map-overlays">

        <!-- Panel de alertas (rojo) -->
        <div id="panel-avisos" class="map-panel hidden">
            <div class="panel-header" style="background:#dc3545;color:#fff" onclick="togglePanel('panel-avisos')">
                <span><i class="fas fa-triangle-exclamation me-2"></i> Alertas (<span id="alert-count">0</span>)</span>
                <i class="fas fa-chevron-down toggle-icon"></i>
            </div>
            <div class="panel-body">
                <div id="lista-avisos" style="padding:6px"></div>
            </div>
        </div>

        <!-- Panel detalle del vehículo seleccionado -->
        <div id="panel-detalle" class="map-panel hidden">
            <div class="panel-header" onclick="togglePanel('panel-detalle')">
                <span><i class="fas fa-car-side me-2"></i> <span id="detalle-titulo">Vehículo</span></span>
                <i class="fas fa-chevron-down toggle-icon"></i>
            </div>
            <div class="panel-body">
                <div id="detalle-contenido"></div>
            </div>
        </div>

        <!-- Panel lista de flota -->
        <div id="panel-flota" class="map-panel">
            <div class="panel-header" onclick="togglePanel('panel-flota')">
                <span><i class="fas fa-truck me-2" style="color:#0891b2"></i> Mi Flota (<span id="flota-count">0</span>)</span>
                <i class="fas fa-chevron-down toggle-icon text-muted"></i>
            </div>
            <div class="panel-body">
                <div id="lista-vehiculos">
                    <div style="padding:14px;text-align:center;color:#64748b">
                        <i class="fas fa-circle-notch fa-spin"></i> Cargando...
                    </div>
                </div>
                <div class="flota-status">
                    <span id="status-refresco">Sincronizando...</span>
                </div>
            </div>
        </div>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    function togglePanel(id) {
        document.getElementById(id).classList.toggle('is-open');
    }

    var map, marcadores = {}, rutas = {}, seleccionado = null, ultimaFlota = [];
    const colores = ['#0891b2', '#e52500', '#28a745', '#ffc107', '#6f42c1', '#008385'];

    document.addEventListener('DOMContentLoaded', function () {
        map = L.map('map', { zoomControl: false }).setView([36.46, -6.19], 11);
        L.control.zoom({ position: 'topleft' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap · © CARTO | AutoRent',
            subdomains: 'abcd', maxZoom: 20
        }).addTo(map);

        // Leaflet necesita recalcular tamaño tras render del layout admin.
        setTimeout(function () { map.invalidateSize(); }, 300);

        if (window.innerWidth > 768) {
            document.getElementById('panel-flota').classList.add('is-open');
        }
        cicloRefresco();
    });

    function fmt(n, dec) { return (n == null) ? '—' : Number(n).toFixed(dec == null ? 0 : dec); }

    async function cargarFlota() {
        try {
            const r = await fetch('/api/gps/flota/', { headers: { 'Accept': 'application/json' } });
            if (r.status === 403 || r.status === 401) { window.location.href = '/admin/login/?next=/admin/flota/'; return; }
            const data = await r.json();
            ultimaFlota = data.vehiculos || [];
            pintarFlota(ultimaFlota);
            document.getElementById('status-refresco').innerText = 'Actualizado ' + new Date().toLocaleTimeString();
        } catch (e) { console.error(e); }
    }

    function iconoVehiculo(v, color) {
        const rot = v.posicion.rumbo || 0;
        const mov = v.posicion.movimiento;
        if (mov) {
            return L.divIcon({
                className: 'custom-pin',
                html: `<div style="transform:rotate(${rot}deg)">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="${color}" stroke="#fff" stroke-width="1.5">
                    <path d="M12 2l7 18-7-4-7 4z"/></svg></div>`,
                iconSize: [28, 28], iconAnchor: [14, 14]
            });
        }
        return L.divIcon({
            className: 'custom-pin',
            html: `<div style="background:${color};width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 4px rgba(0,0,0,.5)"></div>`,
            iconSize: [14, 14], iconAnchor: [7, 7]
        });
    }

    function pintarFlota(vehiculos) {
        const lista = document.getElementById('lista-vehiculos');
        document.getElementById('flota-count').innerText = vehiculos.length;
        lista.innerHTML = '';
        const bounds = [];

        if (!vehiculos.length) {
            lista.innerHTML = '<div style="padding:14px;text-align:center;color:#64748b">Sin vehículos con telemetría.</div>';
            return;
        }

        vehiculos.forEach((v, index) => {
            const p = v.posicion;
            const color = colores[index % colores.length];

            if (marcadores[v.vehiculo_id]) {
                marcadores[v.vehiculo_id].setLatLng([p.lat, p.lon]).setIcon(iconoVehiculo(v, color));
            } else {
                const m = L.marker([p.lat, p.lon], { icon: iconoVehiculo(v, color) }).addTo(map);
                m.on('click', () => seleccionarVehiculo(v.vehiculo_id));
                marcadores[v.vehiculo_id] = m;
            }
            bounds.push([p.lat, p.lon]);

            const item = document.createElement('div');
            item.className = 'veh-item' + (v.vehiculo_id === seleccionado ? ' activo' : '');
            item.innerHTML =
                `<span class="veh-dot" style="color:${color}">●</span>
                 <div style="flex:1">
                    <div class="veh-nombre">${v.vehiculo}</div>
                    <div class="veh-meta">${v.matricula} · ${fmt(p.velocidad)} km/h</div>
                 </div>
                 <span class="badge-estado ${v.online ? 'badge-on' : 'badge-off'}">${v.online ? 'online' : 'offline'}</span>`;
            item.onclick = () => {
                seleccionarVehiculo(v.vehiculo_id);
                map.setView([p.lat, p.lon], 14);
                if (window.innerWidth < 768) togglePanel('panel-flota');
            };
            lista.appendChild(item);
        });

        if (bounds.length && seleccionado === null) {
            map.fitBounds(bounds, { padding: [50, 50], maxZoom: 14 });
        }
    }

    async function seleccionarVehiculo(id) {
        seleccionado = id;
        document.querySelectorAll('.veh-item').forEach(el => el.classList.remove('activo'));

        const v = ultimaFlota.find(x => x.vehiculo_id === id);
        if (!v) return;
        const p = v.posicion;

        // Panel de detalle con toda la información.
        document.getElementById('detalle-titulo').innerText = v.vehiculo;
        const fechaCom = new Date(v.ultima_comunicacion).toLocaleString();
        document.getElementById('detalle-contenido').innerHTML = `
            <div id="score-zona" class="score-box"><span class="score-label">Cargando score…</span></div>
            <div class="detalle-fila"><span class="etq">Matrícula</span><span class="val">${v.matricula}</span></div>
            <div class="detalle-fila"><span class="etq">Categoría</span><span class="val">${v.categoria}</span></div>
            <div class="detalle-fila"><span class="etq">Estado</span><span class="val">${v.online ? '🟢 Online' : '⚪ Offline'}</span></div>
            <div class="detalle-fila"><span class="etq">Velocidad</span><span class="val">${fmt(p.velocidad)} km/h</span></div>
            <div class="detalle-fila"><span class="etq">Encendido</span><span class="val">${p.ignicion ? 'Sí' : 'No'}</span></div>
            <div class="detalle-fila"><span class="etq">Odómetro</span><span class="val">${p.odometro != null ? Number(p.odometro).toLocaleString() + ' km' : '—'}</span></div>
            <div class="detalle-fila"><span class="etq">Combustible</span><span class="val">${fmt(p.nivel_combustible)} %</span></div>
            <div class="detalle-fila"><span class="etq">Batería</span><span class="val">${fmt(p.voltaje_bateria, 1)} V</span></div>
            <div class="detalle-fila"><span class="etq">Rumbo</span><span class="val">${fmt(p.rumbo)}°</span></div>
            <div class="detalle-fila"><span class="etq">Satélites</span><span class="val">${p.satelites != null ? p.satelites : '—'}</span></div>
            <div class="detalle-fila"><span class="etq">Dispositivo</span><span class="val">${v.modelo_dispositivo}</span></div>
            <div class="detalle-fila"><span class="etq">IMEI</span><span class="val" style="font-size:.75rem">${v.imei}</span></div>
            <div class="detalle-fila"><span class="etq">Última señal</span><span class="val" style="font-size:.72rem">${fechaCom}</span></div>
        `;
        cargarScore(id);
        const panelDet = document.getElementById('panel-detalle');
        panelDet.classList.remove('hidden');
        panelDet.classList.add('is-open');

        // Centrar y abrir popup.
        map.setView([p.lat, p.lon], 15);
        if (marcadores[id]) {
            marcadores[id].bindPopup(`<b>${v.vehiculo}</b><br>${v.matricula}<br>${fmt(p.velocidad)} km/h`).openPopup();
        }

        // Dibujar ruta reciente.
        for (let rid in rutas) { map.removeLayer(rutas[rid]); delete rutas[rid]; }
        try {
            const r = await fetch(`/api/gps/vehiculo/${id}/historico/`);
            if (r.ok) {
                const data = await r.json();
                const pts = (data.puntos || []).map(pt => [pt.lat, pt.lon]);
                if (pts.length > 1) {
                    rutas[id] = L.polyline(pts, { color: '#0891b2', weight: 4, opacity: 0.6 }).addTo(map);
                }
            }
        } catch (e) { /* silencioso */ }

        pintarFlota(ultimaFlota);
    }

    async function cargarScore(id) {
        try {
            const r = await fetch(`/api/gps/vehiculo/${id}/score/`);
            if (!r.ok) return;
            const d = await r.json();
            const zona = document.getElementById('score-zona');
            if (!zona) return;
            const s = d.acumulado_30d.score;
            const clase = s >= 80 ? 'score-buena' : (s >= 60 ? 'score-media' : 'score-mala');
            let html = `<div class="score-num ${clase}">${s}</div>` +
                       `<div class="score-label">Driver score (30 días · ${d.acumulado_30d.eventos_total} eventos)</div>`;
            if (d.reserva_activa) {
                const sr = d.reserva_activa.score;
                const cr = sr >= 80 ? 'score-buena' : (sr >= 60 ? 'score-media' : 'score-mala');
                html += `<div style="margin-top:8px;font-size:.8rem">Reserva activa: ` +
                        `<strong class="${cr}">${sr}</strong> · ${d.reserva_activa.cliente}</div>`;
            }
            zona.innerHTML = html;
        } catch (e) { /* silencioso */ }
    }

    async function cicloRefresco() {
        await cargarFlota();
        await cargarAlertas();
        let seg = 10;
        document.getElementById('status-refresco').innerText = `Próxima actualización en ${seg}s`;
        setTimeout(cicloRefresco, seg * 1000);
    }

    async function cargarAlertas() {
        try {
            const r = await fetch('/api/gps/alertas/');
            if (!r.ok) return;
            const data = await r.json();
            const panel = document.getElementById('panel-avisos');
            const lista = document.getElementById('lista-avisos');
            document.getElementById('alert-count').innerText = data.total;
            lista.innerHTML = '';
            if (data.total > 0) {
                panel.classList.remove('hidden');
                if (window.innerWidth > 768) panel.classList.add('is-open');
                data.alertas.forEach(a => {
                    const div = document.createElement('div');
                    div.className = 'alert-item ' + a.tipo;
                    const hora = new Date(a.fecha).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    div.innerHTML =
                        `<div class="alert-top"><span>${a.matricula} · ${a.tipo_display}</span>` +
                        `<span style="color:#94a3b8;font-weight:400">${hora}</span></div>` +
                        `<div class="alert-msg">${a.mensaje}</div>`;
                    lista.appendChild(div);
                });
            } else {
                panel.classList.add('hidden');
            }
        } catch (e) { /* silencioso */ }
    }
</script>
{% endblock %}
